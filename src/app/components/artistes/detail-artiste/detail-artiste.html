<div class="card shadow-sm border-0 mb-4">


  <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
    <h5 class="card-title mb-0 fw-semibold">
      <i class="bi bi-person-badge text-warning me-1"></i>
      Détail de l'artiste
    </h5>

    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onBack()">
      <i class="bi bi-arrow-left"></i> Retour
    </button>
  </div>


  <div *ngIf="isLoading" class="card-body text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>


  <div *ngIf="!isLoading && artiste" class="card-body">

    <!-- SECTION : Informations générales -->
    <h6 class="text-uppercase text-muted mb-3 fw-bold small">
      <i class="bi bi-info-circle me-1"></i> Informations générales
    </h6>

    <div class="row g-3">

      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small"><i class="bi bi-person"></i> Nom</div>
          <div class="fw-semibold fs-6">{{ artiste.nom }}</div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small"><i class="bi bi-person"></i> Prénom</div>
          <div class="fw-semibold fs-6">{{ artiste.prenom }}</div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small"><i class="bi bi-envelope"></i> Email</div>
          <div class="fw-semibold fs-6">{{ artiste.email }}</div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small"><i class="bi bi-music-note-beamed"></i> Nom de scène</div>
          <div class="fw-semibold fs-6">{{ artiste.nomDeScene }}</div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small"><i class="bi bi-stars"></i> Style artistique</div>
          <span class="badge bg-primary px-3 py-2 fs-6">
            {{ artiste.styleArtistique }}
          </span>
        </div>
      </div>

    </div>
  </div>


  <div class="card-footer bg-white border-top d-flex justify-content-end gap-2 py-3">

    <button type="button"
            class="btn btn-warning btn-sm"
            [routerLink]="['/artistes/edit', artiste?.id]"
            [disabled]="!artiste?.id">
      <i class="bi bi-pencil-square"></i> Modifier
    </button>

    <button type="button"
            class="btn btn-danger btn-sm"
            [routerLink]="['/artistes/delete', artiste?.id]"
            [disabled]="!artiste?.id">
      <i class="bi bi-trash-fill"></i> Supprimer
    </button>

  </div>

</div>
