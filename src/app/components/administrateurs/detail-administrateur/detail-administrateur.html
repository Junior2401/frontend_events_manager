<div class="card shadow-sm border-0 mb-4">

  <!-- HEADER -->
  <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
    <h5 class="card-title mb-0 fw-bold">
      <i class="bi bi-person-badge-fill text-primary me-2"></i>
      Détail Administrateur
    </h5>

    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onBack()">
      <i class="bi bi-arrow-left"></i> Retour
    </button>
  </div>

  <!-- LOADING -->
  <div *ngIf="isLoading" class="card-body text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <!-- CONTENT -->
  <div *ngIf="!isLoading && administrateur" class="card-body px-4 py-4">

    <!-- SECTION : Informations générales -->
    <h6 class="text-uppercase text-muted fw-bold small mb-3">
      <i class="bi bi-info-circle me-1"></i> Informations générales
    </h6>

    <div class="row g-3">

      <!-- Nom -->
      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small">
            <i class="bi bi-person"></i> Nom
          </div>
          <div class="fw-semibold fs-6">{{ administrateur.nom }}</div>
        </div>
      </div>

      <!-- Prénom -->
      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small">
            <i class="bi bi-person"></i> Prénom
          </div>
          <div class="fw-semibold fs-6">{{ administrateur.prenom }}</div>
        </div>
      </div>

      <!-- Email -->
      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small">
            <i class="bi bi-envelope"></i> Email
          </div>
          <div class="fw-semibold fs-6">{{ administrateur.email }}</div>
        </div>
      </div>

      <!-- Rôle -->
      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small">
            <i class="bi bi-shield-lock"></i> Rôle
          </div>

          <span class="badge px-3 py-2 fs-6 d-inline-flex align-items-center"
                [ngClass]="getRoleBadge(administrateur.role).class">
            <i [class]="getRoleBadge(administrateur.role).icon" class="me-1"></i>
            {{ getRoleBadge(administrateur.role).label }}
          </span>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="card-footer bg-white border-top d-flex justify-content-end gap-2 py-3">

    <button type="button"
            class="btn btn-warning btn-sm"
            [routerLink]="['/administrateurs/edit', administrateur?.id]"
            [disabled]="!administrateur?.id">
      <i class="bi bi-pencil-square"></i> Modifier
    </button>

    <button type="button"
            class="btn btn-danger btn-sm"
            [routerLink]="['/administrateurs/delete', administrateur?.id]"
            [disabled]="!administrateur?.id">
      <i class="bi bi-trash-fill"></i> Supprimer
    </button>

  </div>

</div>
