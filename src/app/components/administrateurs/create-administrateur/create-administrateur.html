<div class="card card-primary card-outline mb-4">
  <div class="card-header">
    <div class="card-title">{{ pageTitle }}</div>
  </div>

  <div *ngIf="isLoading" class="card-body text-center py-4">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="text-muted mt-2 mb-0">Chargement...</p>
  </div>

  <form *ngIf="!isLoading" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="card-body row g-3">
      <div class="col-md-6">
        <label for="nom" class="form-label">Nom</label>
        <input id="nom" class="form-control" formControlName="nom">
        <small class="text-danger" *ngIf="form.controls.nom.touched && form.controls.nom.invalid">
          Le nom est obligatoire.
        </small>
      </div>

      <div class="col-md-6">
        <label for="prenom" class="form-label">Prenom</label>
        <input id="prenom" class="form-control" formControlName="prenom">
        <small class="text-danger" *ngIf="form.controls.prenom.touched && form.controls.prenom.invalid">
          Le prenom est obligatoire.
        </small>
      </div>

      <div class="col-md-6">
        <label for="email" class="form-label">Email</label>
        <input id="email" class="form-control" type="email" formControlName="email">
        <small class="text-danger" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Un email valide est obligatoire.
        </small>
      </div>

      <div class="col-md-6">
        <label for="role" class="form-label">Role</label>
        <input id="role" class="form-control" formControlName="role">
        <small class="text-danger" *ngIf="form.controls.role.touched && form.controls.role.invalid">
          Le role est obligatoire.
        </small>
      </div>
    </div>

    <div class="card-footer">
      <button type="submit" class="btn float-end" [ngClass]="isEditMode ? 'btn-warning' : 'btn-success'" [disabled]="isSubmitting">
        <i class="bi" [ngClass]="isEditMode ? 'bi-pencil-square' : 'bi-check-circle'"></i>
        {{ isEditMode ? 'Mettre a jour' : 'Ajouter' }}
      </button>
      <button type="button" class="btn btn-secondary float-end me-2" (click)="onBack()">
        <i class="bi bi-arrow-left-circle"></i> Retour
      </button>
    </div>
  </form>
</div>
