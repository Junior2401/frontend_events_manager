<div class="card card-outline card-primary shadow-sm">
  <div class="card-header border-0 bg-transparent py-3">
    <div class="d-flex justify-content-between align-items-center">
      <h3 class="card-title fw-bold mb-0">
        <i class="bi bi-shield-lock-fill text-primary me-2"></i>
        Liste des Administrateurs
      </h3>
      <div class="card-tools">
        <button class="btn btn-primary btn-sm rounded-pill px-3 shadow-sm" [routerLink]="['/administrateurs/create']">
          <i class="bi bi-plus-circle me-1"></i> Nouvel Administrateur
        </button>
      </div>
    </div>
  </div>

  <div class="card-body p-0">
    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2 small">Chargement...</p>
    </div>

    <div *ngIf="!isLoading" class="table-responsive p-4">
      <table id="example1" class="table table-hover table-striped align-middle border-top">
        <thead class="bg-light">
        <tr>
          <th>#</th>
          <th>Nom</th>
          <th>Prenom</th>
          <th>Email</th>
          <th>Role</th>
          <th class="text-end px-4">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let item of administrateurs; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ item.nom }}</td>
          <td>{{ item.prenom }}</td>
          <td>{{ item.email }}</td>
          <td>{{ item.role }}</td>
          <td class="text-end px-4">
            <div class="btn-group shadow-sm">
              <button class="btn btn-sm btn-light border-end text-info" title="Détail" [routerLink]="['/administrateurs/detail', item.id]" [disabled]="!item.id">
                <i class="bi bi-eye"></i>
              </button>
              <button class="btn btn-sm btn-light border-end text-primary" title="Modifier" [routerLink]="['/administrateurs/edit', item.id]" [disabled]="!item.id">
                <i class="bi bi-pencil-square"></i>
              </button>
              <button class="btn btn-sm btn-light text-danger" title="Supprimer" [routerLink]="['/administrateurs/delete', item.id]" [disabled]="!item.id">
                <i class="bi bi-trash-fill"></i>
              </button>
            </div>
          </td>
        </tr>

        <tr *ngIf="administrateurs.length === 0">
          <td colspan="6" class="text-center text-muted py-5">Aucune donnee disponible.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card-footer bg-transparent border-0 py-3">
  </div>
</div>
