<div class="card shadow-sm border-0 mb-4">
  <div class="card-header bg-white border-bottom py-3">
    <h5 class="card-title mb-0 fw-semibold">Confirmation de suppression</h5>
  </div>

  <div *ngIf="isLoading" class="card-body text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="text-muted mt-3">Chargement...</p>
  </div>

  <div *ngIf="!isLoading && evenement" class="card-body text-center py-4">
    <p class="fs-5">
      Etes-vous sûr de vouloir supprimer
      <strong class="text-primary">{{ evenement.libelle }}</strong> ?
    </p>
    <p class="text-muted">Cette action est irréversible.</p>
  </div>

  <div class="card-footer bg-white border-top">
    <div class="row justify-content-center">
      <div class="col-sm-4 mb-2">
        <button class="btn btn-sm btn-secondary w-100" (click)="onBack()">
          <i class="bi bi-arrow-left-circle"></i> Retour
        </button>
      </div>
      <div class="col-sm-4">
        <button class="btn btn-sm btn-danger w-100" (click)="onDelete()" [disabled]="isSubmitting">
          <i class="bi bi-trash-fill"></i> Supprimer
        </button>
      </div>
    </div>
  </div>
</div>
