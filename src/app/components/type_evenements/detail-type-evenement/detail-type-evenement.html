<div class="card shadow-sm border-0 mb-4">

  <!-- HEADER -->
  <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
    <h5 class="card-title mb-0 fw-bold">
      <i class="bi bi-calendar-event-fill text-primary me-2"></i>
      Détail du type d'événement
    </h5>

    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onBack()">
      <i class="bi bi-arrow-left"></i> Retour
    </button>
  </div>

  <!-- LOADING -->
  <div *ngIf="isLoading" class="card-body text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="text-muted mt-3">Chargement...</p>
  </div>

  <!-- CONTENT -->
  <div *ngIf="!isLoading && typeEvenement" class="card-body px-4 py-4">

    <!-- SECTION : Informations générales -->
    <h6 class="text-uppercase text-muted fw-bold small mb-3">
      <i class="bi bi-info-circle me-1"></i> Informations générales
    </h6>

    <div class="row g-3">

      <!-- Libellé -->
      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small">
            <i class="bi bi-tag"></i> Libellé
          </div>
          <div class="fw-semibold fs-6">{{ typeEvenement.libelle }}</div>
        </div>
      </div>

      <!-- Description -->
      <div class="col-md-6">
        <div class="p-3 border rounded bg-light">
          <div class="text-muted small">
            <i class="bi bi-card-text"></i> Description
          </div>
          <div class="fw-semibold fs-6">{{ typeEvenement.description || '-' }}</div>
        </div>
      </div>

    </div>
  </div>
