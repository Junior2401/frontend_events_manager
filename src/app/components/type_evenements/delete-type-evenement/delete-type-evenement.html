<div class="card shadow-sm border-0 mb-4">

  <!-- HEADER -->
  <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
    <h5 class="card-title mb-0 fw-semibold">Confirmation de suppression</h5>
  </div>

  <!-- LOADING -->
  <div *ngIf="isLoading" class="card-body text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="text-muted mt-3">Chargement...</p>
  </div>

  <!-- CONTENT -->
  <div *ngIf="!isLoading && typeEvenement" class="card-body bg-warning text-center py-4">

    <p class="fs-5">
      Êtes-vous sûr de vouloir supprimer le type d'événement
      <strong class="text-primary">"{{ typeEvenement.libelle }}"</strong> ?
    </p>

    <p class="text-muted">
      Cette action est irréversible.
    </p>

  </div>

  <!-- FOOTER -->
  <div class="card-footer bg-white border-top">
    <div class="row justify-content-center">

      <!-- Bouton Retour -->
      <div class="col-sm-4 mb-2">
        <button class="btn btn-sm btn-secondary w-100" (click)="onBack()">
          <i class="bi bi-arrow-left-circle"></i> Retour
        </button>
      </div>

      <!-- Bouton Supprimer -->
      <div class="col-sm-4">
        <button
          class="btn btn-sm btn-danger w-100"
          (click)="onDelete()"
          [disabled]="isSubmitting">
          Supprimer <i class="bi bi-trash-fill"></i>
        </button>
      </div>

    </div>
  </div>

</div>
