<div class="card card-outline card-primary shadow-sm">
  <div class="card-header border-0 bg-transparent py-3">
    <div class="d-flex justify-content-between align-items-center">
      <h3 class="card-title fw-bold mb-0">
        <i class="bi bi-diagram-3-fill text-primary me-2"></i>
        Liste des Types Événements
      </h3>
      <div class="card-tools">
        <button class="btn btn-primary btn-sm rounded-pill px-3 shadow-sm"
                [routerLink]="['/type-evenements/create']">
          <i class="bi bi-plus-circle me-1"></i> Nouveau Type
        </button>
      </div>
    </div>
  </div>

  <div class="card-body p-0">
    <!-- Notification -->
    <div *ngIf="notification" class="px-4 pt-3">
      <div [class]="'alert alert-' + notification.type + ' alert-dismissible fade show'" role="alert">
        <i [class]="notification.type === 'success' ? 'bi bi-check-circle-fill me-2' : 'bi bi-exclamation-triangle-fill me-2'"></i>
        {{ notification.message }}
        <button type="button" class="btn-close" (click)="closeNotification()" aria-label="Close"></button>
      </div>
    </div>

    <!-- Spinner chargement -->
    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="text-muted mt-2 small">Chargement...</p>
    </div>

    <div *ngIf="!isLoading" class="table-responsive p-4">
      <table id="example1" class="table table-hover table-striped align-middle border-top">
        <thead class="bg-light">
        <tr>
          <th class="border-bottom-0 py-3">#</th>
          <th class="border-bottom-0 py-3">Libellé</th>
          <th class="border-bottom-0 py-3">Description</th>
          <th class="border-bottom-0 py-3 text-end px-4" style="width: 150px;">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let item of typeEvenements; let i = index">
          <td class="fw-semibold text-muted">{{ i + 1 }}</td>
          <td class="fw-semibold">{{ item.libelle }}</td>
          <td class="fw-semibold">{{ item.description }}</td>
          <td class="text-end px-4">
            <div class="btn-group shadow-sm">
              <button class="btn btn-sm btn-light border-end text-info" title="Detail"
                      [routerLink]="['/type-evenements/detail', item.id]" [disabled]="!item.id">
                <i class="bi bi-eye"></i>
              </button>
              <button class="btn btn-sm btn-light border-end text-primary" title="Modifier"
                      [routerLink]="['/type-evenements/edit', item.id]" [disabled]="!item.id">
                <i class="bi bi-pencil-square"></i>
              </button>
              <button class="btn btn-sm btn-light text-danger" title="Supprimer"
                      [routerLink]="['/type-evenements/delete', item.id]" [disabled]="!item.id">
                <i class="bi bi-trash-fill"></i>
              </button>
            </div>
          </td>
        </tr>

        <tr *ngIf="typeEvenements.length === 0">
          <td colspan="4" class="text-center text-muted py-5">
            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
            Aucune donnée disponible.
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card-footer bg-transparent border-0 py-2 px-4 text-muted small">
    {{ typeEvenements.length }} type(s) trouvé(s)
  </div>
</div>
